<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entre em contato com o estúdio Scorpion Bits. Escreva para scorpionbits.contato@gmail.com ou nos siga nas redes sociais.">
    <title>Scorpion Bits - Contato</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="floating-background" id="floating-background"></div>

    <div class="floating-foreground" id="floating-foreground"></div>

    <header class="site-header">
        <nav class="navbar" id="main-navbar">

            <a href="index.html#inicio" class="logo-container" id="nav-logo-link">
                <img src="assets/scorpion_bits_logo_stamp.png" alt="Scorpion Bits" class="logo" id="nav-logo-img">
            </a>

            <button class="menu-toggle" id="menu-toggle" aria-label="Abrir Menu">
                <i class="fa-solid fa-bars"></i>
            </button>

            <ul class="nav-menu" id="nav-menu-list">
                <li><a href="index.html#inicio" class="nav-link" id="link-home">Home</a></li>
                <li><a href="index.html#sobre" class="nav-link" id="link-sobre">Sobre</a></li>
                <li><a href="index.html#portfolio" class="nav-link" id="link-portfolio">Portfólio</a></li>
                <li><a href="index.html#contato" class="nav-link" id="link-contato">Contato</a></li>
            </ul>

            <div class="nav-actions" id="nav-actions-container">
                <a href="https://github.com/scorpion-bits" target="_blank" class="social-link" id="link-github" title="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
                <a href="https://instagram.com/scorpionbits_" target="_blank" class="social-link" id="link-instagram" title="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://linkedin.com" target="_blank" class="social-link" id="link-linkedin" title="LinkedIn">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
                <a href="https://itch.io" target="_blank" class="social-link" id="link-itchio" title="Itch.io">
                    <i class="fa-brands fa-itch-io"></i>
                </a>
            </div>
        </nav>
    </header>

    <main class="content-wrapper" id="main-content">
        <div class="team-card card-large">
            <div style="font-size: 4rem; margin-bottom: 24px; color: var(--primary-color); filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.4));">
                <i class="fa-regular fa-envelope"></i>
            </div>
            <h1 class="hero-title" style="font-size: 2.2rem; font-weight: 700; margin-bottom: 16px;">
                Entre em <span class="gradient-text">Contato</span>
            </h1>
            <p style="color: var(--text-muted); font-size: 1.05rem; line-height: 1.6; margin-bottom: 32px;">
                Tem alguma ideia de jogo, quer fazer uma parceria ou apenas bater um papo? Escreva para nós pelo e-mail oficial:
            </p>

            <a href="mailto:scorpionbits.contato@gmail.com" class="email-btn">
                <i class="fa-solid fa-paper-plane"></i>
                scorpionbits.contato@gmail.com
            </a>

            <h3 style="font-size: 0.9rem; color: var(--text-main); margin-bottom: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em;">
                Nossas Redes Sociais
            </h3>
            <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
                <a href="https://github.com/scorpion-bits" target="_blank" class="social-link" id="contact-github" title="GitHub" style="width: 48px; height: 48px; font-size: 1.4rem;">
                    <i class="fa-brands fa-github"></i>
                </a>
                <a href="https://instagram.com/scorpionbits_" target="_blank" class="social-link" id="contact-instagram" title="Instagram" style="width: 48px; height: 48px; font-size: 1.4rem;">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://linkedin.com" target="_blank" class="social-link" id="contact-linkedin" title="LinkedIn" style="width: 48px; height: 48px; font-size: 1.4rem;">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
                <a href="https://itch.io" target="_blank" class="social-link" id="contact-itchio" title="Itch.io" style="width: 48px; height: 48px; font-size: 1.4rem;">
                    <i class="fa-brands fa-itch-io"></i>
                </a>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
